<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Google</title>
  <link rel="stylesheet" href="estilosGoogle.css" />
  <link rel="icon" href="https://www.google.com/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <main class="contenedor">

        <div class="barra">
            <nav class="navegacion">
                <a class="enlace" href="#">Gmail</a>
                <a class="enlace" href="#">Imágenes</a>
                <a class="enlace-acceder" href="#">Acceder</a>
            </nav>
        </div>
       
        <div class="contenido-google">
            <div class="encabezado-google">
                <span class="azul">G</span>
                <span class="rojo">o</span>
                <span class="amarillo">o</span>
                <span class="azul">g</span>
                <span class="verde">l</span>
                <span class="rojo">e</span>
            </div>
            
            <form class="formulario">
                <fieldset class="contenedor-busqueda">
                    <input class="input-busqueda" placeholder="Ingresa una búsqueda..." type="text">
                </fieldset>
                <fieldset class="contenedor-botones">
                    <input class="botones-google" type="submit" value="Buscar con Google">
                    <input class="botones-google" type="submit" value="Voy a tener suerte">
                </fieldset>
            </form>
        </div>

    </main>

    <footer class="footer">
            <div class="pais">
                <p>México</p>
            </div>
            <div class="linea"></div>
            <div class="enlaces-footer">
                <nav class="navegacion-footer">
                    <a href="#">Sobre Google</a>
                    <a href="#">Publicidad</a>
                    <a href="#">Negocios</a>
                    <a href="#">Cómo funciona la búsqueda</a>
                </nav>

                <nav class="navegacion-footer">
                    <a href="#">Privacidad</a>
                    <a href="#">Condiciones</a>
                    <a href="#">Configuración</a>
                </nav>
            </div>
        </footer>

</body>
</html>
