<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Iniciar sesión</title>
    <link rel="stylesheet" href="estilosFacebook.css">
</head>
<body>

    <main class="contenedor">

        <div class="contenedor-descripcion">
            <h1 class="encabezado-principal">facebook</h1>
            <p class="descripcion-pagina">Facebook te ayuda a comunicarte y compartir con las personas que forman parte de tu vida.</p>
        </div>

        <div class="contenedor-form">
            <form class="formulario">
                <fieldset class="contenido-formulario">
                    <input class="campo" placeholder="Correo electrónico o número de teléfono" type="text">
                    <input class="campo" placeholder="Contraseña" type="password">
                    <input class="boton-sesion" type="submit" value="Iniciar sesión">
                    <a class="enlace" href="#">¿Olvidaste tu contraseña?</a>
                    <div class="linea"></div>
                    <input class="boton-crear-cuenta" type="submit" value="Crear cuenta nueva">
                </fieldset>
            </form>
            <p class="msj-crea-cuenta"><strong>Crea una página</strong> para una celebridad, una marca o un negocio.</p>
        </div>

    </main>

</body>
</html>
